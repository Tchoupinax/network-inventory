name: Build

on:
  push:
    branches:
      - feature/**

jobs:
  docker:
    name: "👷 Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js 25
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: 25

      - run: pnpm install --frozen-lockfile && pnpm build
