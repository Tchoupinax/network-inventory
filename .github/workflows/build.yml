name: Build

on:
  push:
    branches:
      - feature/**

jobs:
  docker:
    name: "👷 Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Use Node.js 25
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: 25

      - run: pnpm install --frozen-lockfile && pnpm build
