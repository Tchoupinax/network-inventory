name: Build

on:
  push:
    branches:
      - feature/**

jobs:
  docker:
    name: "👷 Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Use Node.js 25
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: 25

      - run: pnpm install --frozen-lockfile && pnpm build
