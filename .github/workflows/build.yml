name: Build

on:
  push:
    branches:
      - feature/**

jobs:
  docker:
    name: "👷 Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Use Node.js 25
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: 25

      - run: pnpm install --frozen-lockfile && pnpm build
