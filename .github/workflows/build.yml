name: Build

on:
  push:
    branches:
      - feature/**

jobs:
  docker:
    name: "👷 Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Use Node.js 25
        uses: actions/setup-node@v7
        with:
          cache: 'pnpm'
          node-version: 25

      - run: pnpm install --frozen-lockfile && pnpm build
